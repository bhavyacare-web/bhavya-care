<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; }

        /* Navbar Design */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 15px 40px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo h2 { color: #0056b3; font-size: 26px; font-weight: 800; }
        .logo span { color: #28a745; }

        /* Right Side Actions */
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .cart-btn { text-decoration: none; color: #333; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        #cart-count { background-color: #e74c3c; color: white; padding: 2px 7px; border-radius: 50%; font-size: 12px; }
        
        /* Buttons */
        .btn { border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .login-btn { background-color: #0056b3; }
        .login-btn:hover { background-color: #004494; }
        .logout-btn { background-color: #e74c3c; display: none; }
        .logout-btn:hover { background-color: #c0392b; }
        .dashboard-btn { background-color: #28a745; display: none; }

        /* Login Form Box */
        #login-section {
            width: 90%; max-width: 400px; margin: 40px auto; padding: 30px;
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px; text-align: center; display: none; 
            position: absolute; top: 70px; right: 40px; z-index: 999;
        }
        #login-section h3 { color: #333; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .support-text { font-size: 12px; color: #888; margin-top: 15px; }

        @media (max-width: 768px) {
            .navbar { padding: 15px; }
            .logo h2 { font-size: 22px; }
            .btn { padding: 8px 15px; font-size: 14px; }
            #login-section { right: 5%; left: 5%; width: 90%; top: 80px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h2>Bhavya<span>Care</span></h2>
        </div>

        <div class="nav-actions">
            <a href="#" class="cart-btn">
                🛒 Cart <span id="cart-count">0</span>
            </a>
            <button id="nav-login-btn" class="btn login-btn" onclick="toggleLogin()">Login / Sign Up</button>
            <button id="nav-dashboard-btn" class="btn dashboard-btn" onclick="goToDashboard()">My Dashboard</button>
            <button id="nav-logout-btn" class="btn logout-btn" onclick="logoutUser()">Logout</button>
        </div>
    </header>

    <div id="login-section">
        <h3 id="form-title">Login / Sign Up</h3>
        
        <div id="phone-section">
            
            <div id="partner-role-container" style="display: none; margin-bottom: 15px;">
                <p style="text-align: left; font-size: 14px; color: #666;">Select Partner Type:</p>
                <select id="partnerRole" class="input-box">
                    <option value="doctor" selected>Doctor</option>
                    <option value="lab">Lab</option>
                    <option value="pharmacy">Pharmacy</option>
                    <option value="hospital">Hospital</option>
                    <option value="executive">Executive</option>
                </select>
            </div>

            <p style="text-align: left; font-size: 14px; color: #666;">Mobile Number:</p>
            <input type="tel" id="phoneNumber" class="input-box" placeholder="e.g. 8950112467" maxlength="10">
            <div id="recaptcha-container" style="margin-top: 10px;"></div>
            <button id="send-otp-btn" class="action-btn" onclick="sendOTP()">Get OTP</button>
        </div>

        <div id="otp-section" style="display: none;">
            <p style="text-align: left; font-size: 14px; color: #666;">Enter OTP:</p>
            <input type="tel" id="otpCode" class="input-box" placeholder="6-digit OTP" maxlength="6">
            <button class="action-btn" style="background-color: #0056b3;" onclick="verifyOTP()">Verify Mobile</button>
            <p style="margin-top: 15px; font-size: 13px; color: #0056b3; cursor: pointer; text-decoration: underline;" onclick="resetForm()">Change Mobile Number</p>
        </div>
        
        <div id="partner-link-container">
            <p id="partner-toggle-text" style="margin-top: 15px; font-size: 14px; font-weight: 600; color: #0056b3; cursor: pointer; text-decoration: underline;" onclick="togglePartnerMode()">Register as a Partner</p>
        </div>

        <p class="support-text">Need help? Email us at bhavyacare1@gmail.com</p>
    </div>

    <script src="app.js"></script>

</body>
</html>
