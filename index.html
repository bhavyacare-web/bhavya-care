<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        
        /* Dashboard & Login Buttons Styling */
        .action-section { text-align: center; padding: 30px 20px; background-color: #e6f0fa; }
        .action-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        
        .btn-dashboard {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
            transition: 0.3s;
            display: none; /* Default hidden, JS se show hoga */
        }
        .btn-dashboard:hover { background-color: #0056b3; transform: translateY(-2px); }

        .btn-login {
            background-color: white;
            color: #007bff;
            border: 2px solid #007bff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: none; /* Default hidden, JS se show hoga */
        }
        .btn-login:hover { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="action-section">
        <div class="action-buttons">
            <button id="goToDashboardBtn" class="btn-dashboard" onclick="window.location.href='patient_dashboard.html'">
                <i class="fas fa-user-circle"></i> My Dashboard
            </button>
            <button id="homeLoginBtn" class="btn-login" onclick="document.getElementById('loginModal').style.display='block'">
                Login / Register
            </button>
        </div>
    </div>

    <script>
        // Step 1: header.html fetch karna
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                
                // Step 2: Header load hone ke baad app.js load karna 
                let script = document.createElement('script');
                script.src = 'app.js';
                document.body.appendChild(script);

                // Step 3: Firebase Auth Listener
                script.onload = () => {
                    firebase.auth().onAuthStateChanged((user) => {
                        if (user) {
                            document.getElementById('goToDashboardBtn').style.display = 'inline-block';
                            document.getElementById('homeLoginBtn').style.display = 'none';
                        } else {
                            document.getElementById('goToDashboardBtn').style.display = 'none';
                            document.getElementById('homeLoginBtn').style.display = 'inline-block';
                        }
                    });
                };
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

</body>
</html>
