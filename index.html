<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavyacare - India's Trusted Healthcare Platform</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
        }

        /* Main Content Section (Header ke niche wala hissa) */
        .main-content {
            padding: 50px 20px;
            text-align: center;
        }

        .hero-banner {
            background-color: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .hero-banner h1 {
            color: #0056b3;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .hero-banner p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .contact-info {
            background-color: #e9f5ff;
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="main-content">
        <div class="hero-banner">
            <h1>Welcome to bhavyacare.com</h1>
            <p>Aapki health, hamari zimmedari. Book Lab Tests (MRI, CT Scan, X-Ray), Consult Top Doctors, Order Medicines, aur Hospital Admission ki suvidha ek hi platform par.</p>
            
            <div class="contact-info">
                <strong>📞 Support:</strong> +918950112467 <br>
                <strong>✉️ Email:</strong> bhavyacare1@gmail.com
            </div>
        </div>
    </div>

    <script>
        // Yeh code header.html file ko fetch karega aur upar div mein daal dega
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                
                // Header load hone ke baad, agar usme koi scripts hain (jaise toggleLogin), 
                // toh unhe dobara execute karna padta hai.
                // Abhi ke liye aapka UI direct set ho jayega!
            })
            .catch(error => {
                console.error("Header load hone mein error aaya:", error);
                document.getElementById('header-placeholder').innerHTML = "<p style='text-align:center; color:red;'>Header load nahi ho paya.</p>";
            });
    </script>

    <script src="app.js"></script>

</body>
</html>
