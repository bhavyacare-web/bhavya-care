<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwIxSjlD6oVAGi4InT6Lb8RPg6NWrl7vpptoYrEG5HKPzPaadUp_0pVnN_1OZfJ7X_r/exec";
    
    const services = ["pathology", "profile", "discount_profile", "usg", "xray", "ct", "mri", "ecg", "echo", "tmt", "eeg", "pft", "holter", "abp", "ncv_emg", "ssep", "evoked_potentiat", "sleep_study", "mammography", "dlco", "endoscopy", "colonoscopy"];
    const days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"];
    
    let pincodeList = [];
    let cityList = [];

    document.addEventListener("DOMContentLoaded", () => {
        const labName = localStorage.getItem("bhavya_name");
        const userId = localStorage.getItem("bhavya_user_id");
        
        if (!userId || localStorage.getItem("bhavya_role") !== "lab") {
            alert("Unauthorized Access! Please login first."); 
            window.location.href = "../index.html"; 
            return;
        }

        // Form build karne ka function
        function buildRegistrationForm() {
            document.getElementById("statusChecker").style.display = "none";
            document.getElementById("mainFormContainer").style.display = "block";
            
            document.getElementById("lab_name").value = labName;

            const servDiv = document.getElementById("servicesContainer");
            servDiv.innerHTML = "";
            services.forEach(srv => {
                let displayName = srv.replace("_", " ").toUpperCase();
                servDiv.innerHTML += `<label><input type="checkbox" id="srv_${srv}"> ${displayName}</label>`;
            });

            const timeDiv = document.getElementById("timingsContainer");
            timeDiv.innerHTML = "";
            days.forEach(day => {
                let dayName = day.charAt(0).toUpperCase() + day.slice(1);
                timeDiv.innerHTML += `
                <div class="timing-row">
                    <div class="timing-day">${dayName}</div>
                    <div><input type="time" id="${day}_open" title="Opening Time"></div>
                    <div><input type="time" id="${day}_close" title="Closing Time"></div>
                </div>`;
            });
        }

        // ✨ CORS HEADERS ADDED HERE ✨
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "checkLabStatus", user_id: userId })
        })
        .then(res => res.json())
        .then(data => {
            const statusBox = document.getElementById("statusChecker");
            
            // Backend format handle karna
            let labStatus = data.data ? data.data.status : data.status;
            
            if (labStatus === "ACTIVE") {
                window.location.replace("lab_dashboard.html"); 
            } 
            else if (labStatus === "INACTIVE" || labStatus === "PENDING") {
                statusBox.innerHTML = `
                    <i class="fas fa-clock" style="color: #f59e0b;"></i>
                    <h2>Application Under Review</h2>
                    <p style="margin-top:10px;">Your application is under process. Please try again after some time or you will be notified via email.</p>
                `;
            } 
            else {
                buildRegistrationForm();
            }
        })
        .catch(error => {
            console.error("Status Check Error:", error);
            // Agar API block bhi ho jaye, toh form khulega
            buildRegistrationForm();
        });

        document.getElementById("pincodeInput").addEventListener("keypress", function(e) { if (e.key === "Enter") { e.preventDefault(); addTag('pincode'); } });
        document.getElementById("cityInput").addEventListener("keypress", function(e) { if (e.key === "Enter") { e.preventDefault(); addTag('city'); } });
        document.getElementById("labRegForm").addEventListener("submit", handleFormSubmit);
    });

    // ==========================================
    // TAG SYSTEM
    // ==========================================
    function addTag(type, aiValue = null) {
        let inputElem = document.getElementById(type + "Input");
        let val = aiValue ? aiValue : inputElem.value.trim();
        if (!val) return;

        if (type === 'pincode' && !pincodeList.includes(val)) {
            pincodeList.push(val); updateTagsUI('pincode');
        } else if (type === 'city') {
            val = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            let lowerCaseCityList = cityList.map(c => c.toLowerCase());
            if (!lowerCaseCityList.includes(val.toLowerCase())) { cityList.push(val); updateTagsUI('city'); }
        }
        if(!aiValue) inputElem.value = ""; 
    }

    function removeTag(type, index) {
        if (type === 'pincode') pincodeList.splice(index, 1); else cityList.splice(index, 1);
        updateTagsUI(type);
    }

    function updateTagsUI(type) {
        let wrapperId = (type === 'pincode') ? 'pinTags' : 'cityTags';
        let wrapper = document.getElementById(wrapperId);
        let hiddenInput = document.getElementById("available_" + type);
        let list = type === 'pincode' ? pincodeList : cityList;
        
        if (!wrapper) return; 

        wrapper.innerHTML = "";
        list.forEach((item, index) => {
            let tag = document.createElement("div");
            tag.className = "tag";
            tag.innerHTML = `${item} <span onclick="removeTag('${type}', ${index})" title="Remove">×</span>`;
            wrapper.appendChild(tag);
        });
        
        if (hiddenInput) {
            hiddenInput.value = list.join(',');
        }
    }

    // ==========================================
    // AI AUTO FILL LOGIC (MAPS + POSTAL API)
    // ==========================================
    async function aiAutoFillPincodes() {
        const basePincode = document.getElementById("pincode").value.trim();
        const city = document.getElementById("city").value.trim();
        const radiusKm = parseInt(document.getElementById("radiusSelect").value);

        if (!basePincode || !city) { alert("Please enter both 'City' and 'Main Pincode' in the Basic Details section first."); return; }

        const btn = document.querySelector(".ai-btn");
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Scanning Area..."; btn.disabled = true;
        const geocoder = new google.maps.Geocoder();
        const addressStr = `${city}, ${basePincode}, India`;

        geocoder.geocode({ address: addressStr }, async function(results, status) {
            if (status === 'OK') {
                const labLocation = results[0].geometry.location;
                try {
                    const radiusMeters = radiusKm * 1000;
                    const request = { fields: ['addressComponents'], locationRestriction: { center: labLocation, radius: radiusMeters }};
                    const { places } = await google.maps.places.Place.searchNearby(request);
                    
                    let discoveredPincodes = new Set(); discoveredPincodes.add(basePincode);
                    if (places && places.length > 0) {
                        places.forEach(place => {
                            if (place.addressComponents) {
                                place.addressComponents.forEach(comp => { if (comp.types.includes('postal_code')) discoveredPincodes.add(comp.longText); });
                            }
                        });
                    }
                    
                    if(discoveredPincodes.size === 1) {
                        let baseNum = parseInt(basePincode); let extra = Math.ceil(radiusKm / 10) + 1;
                        for(let i=1; i<=extra; i++){ discoveredPincodes.add((baseNum + i).toString()); discoveredPincodes.add((baseNum - i).toString()); }
                    }

                    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Fetching Villages...";
                    let foundVillages = 0; let foundPins = 0; const pinArray = Array.from(discoveredPincodes);
                    
                    for (const pin of pinArray) {
                        addTag('pincode', pin); foundPins++;
                        try {
                            let response = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                            let data = await response.json();
                            if(data && data[0] && data[0].Status === "Success") {
                                data[0].PostOffice.forEach(po => {
                                    let areaName = po.Name;
                                    if(areaName.toLowerCase() !== city.toLowerCase() && areaName.toLowerCase() !== "india") { addTag('city', areaName); foundVillages++; }
                                });
                            }
                        } catch(e) {}
                    }
                    addTag('city', city); resetBtn(btn);
                    alert(`AI Magic Complete! Found ${foundPins} Pincodes and ${foundVillages} real Indian villages within your ${radiusKm}km radius.`);
                } catch (error) {
                    let baseNum = parseInt(basePincode); let extra = Math.ceil(radiusKm / 10) + 1;
                    addTag('pincode', basePincode);
                    for(let i=1; i<=extra; i++){ addTag('pincode', (baseNum + i).toString()); addTag('pincode', (baseNum - i).toString()); }
                    addTag('city', city); resetBtn(btn); alert("Added nearby area Pincodes successfully.");
                }
            } else {
                alert("Could not locate your main Pincode on Google Maps."); addTag('pincode', basePincode); addTag('city', city); resetBtn(btn);
            }
        });
    }

    function resetBtn(btn) { btn.innerHTML = "<i class='fas fa-magic'></i> Auto-Fill Area"; btn.disabled = false; }
    
    function toggleCert(type) {
        const val = document.getElementById(type).value; const fileInput = document.getElementById(type + "_cert");
        if (val === "Yes") { fileInput.style.display = "block"; fileInput.required = true; } 
        else { fileInput.style.display = "none"; fileInput.required = false; }
    }
    
    function getBase64(fileId) {
        return new Promise((resolve, reject) => {
            const fileInput = document.getElementById(fileId);
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) { resolve(""); return; }
            const file = fileInput.files[0]; const reader = new FileReader();
            reader.readAsDataURL(file); reader.onload = () => resolve(reader.result.split(',')[1]); reader.onerror = error => reject(error);
        });
    }

    // ==========================================
    // FORM SUBMIT & UPLOAD
    // ==========================================
    async function handleFormSubmit(e) {
        e.preventDefault();
        
        if(pincodeList.length === 0 || cityList.length === 0) { alert("Please add at least one Available Pincode and one Available City using the '+' or 'Auto-Fill' button."); return; }

        let hasAtLeastOneTime = false;
        days.forEach(day => {
            let openTime = document.getElementById(day + "_open").value; let closeTime = document.getElementById(day + "_close").value;
            if (openTime && closeTime) hasAtLeastOneTime = true;
        });

        if (!hasAtLeastOneTime) { alert("Please provide Opening and Closing times for at least 1 day."); return; }

        const btn = document.getElementById("submitBtn");
        btn.innerText = "Uploading Documents & Saving... Please wait (Do not close tab)"; btn.disabled = true;

        try {
            let available_pincodes_json = JSON.stringify(pincodeList); let available_cities_str = cityList.join(', ');
            let base64RegDoc = await getBase64("reg_doc"); let base64Nabl = await getBase64("nabl_cert"); let base64Nabh = await getBase64("nabh_cert");
            let base64Img1 = await getBase64("lab_img1"); let base64Img2 = await getBase64("lab_img2"); let base64Img3 = await getBase64("lab_img3");

            let payload = {
                action: "submitLabProfile", user_id: localStorage.getItem("bhavya_user_id"), lab_name: document.getElementById("lab_name").value,
                lab_registration_docoment: base64RegDoc, lab_email: document.getElementById("lab_email").value, lab_address: document.getElementById("lab_address").value,
                city: document.getElementById("city").value, pincode: document.getElementById("pincode").value, available_pincode: available_pincodes_json,
                nabl: document.getElementById("nabl").value, nabl_certificate: base64Nabl, nabh: document.getElementById("nabh").value, nabh_certificate: base64Nabh,
                lab_image1: base64Img1, lab_image2: base64Img2, lab_image3: base64Img3, available_city: available_cities_str
            };

            services.forEach(srv => { let checkbox = document.getElementById("srv_" + srv); payload[srv] = (checkbox && checkbox.checked) ? "Yes" : "No"; });
            days.forEach(day => { payload[day + "_opening_time"] = document.getElementById(day + "_open").value; payload[day + "_closing_time"] = document.getElementById(day + "_close").value; });

            const response = await fetch(GOOGLE_SCRIPT_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(payload) 
            });
            const resData = await response.json();

            if (resData.status === "success") {
                alert("Success! Your profile has been submitted and is under process.");
                window.location.reload(); 
            } else {
                alert("Server Error: " + resData.message); btn.innerText = "Submit Profile for Verification"; btn.disabled = false;
            }
        } catch (error) {
            console.error("Submission Error:", error); alert("A network error occurred. Please ensure document sizes are small (under 2MB) and try again.");
            btn.innerText = "Submit Profile for Verification"; btn.disabled = false;
        }
    }
</script>
