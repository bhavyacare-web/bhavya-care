<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management - BhavyaCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #f4f7f6; height: 100vh; overflow: hidden; }

        .sidebar { width: 250px; background-color: #0056b3; color: white; display: flex; flex-direction: column; }
        .sidebar .logo { padding: 20px; font-size: 24px; font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logo span { color: #28a745; }
        .sidebar .menu { flex: 1; padding: 20px 0; }
        .sidebar .menu a { display: block; padding: 15px 25px; color: white; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .sidebar .menu a:hover, .sidebar .menu a.active { background-color: #004494; border-left: 4px solid #28a745; }
        .sidebar .menu a i { margin-right: 10px; width: 20px; text-align: center; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background-color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h2 { color: #333; font-size: 22px; }
        .admin-profile { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #555; cursor: pointer;}
        .admin-profile i { font-size: 24px; color: #0056b3; }

        .container { padding: 30px; max-width: 1100px; margin: 0 auto; width: 100%; }

        .input-box { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; outline: none; }
        .btn-action { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        .table-wrapper { background: white; border-radius: 8px; overflow: hidden; margin-top: 15px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; font-weight: 600; }
        td { color: #555; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }

        .action-btns button { border: none; padding: 8px 12px; margin-right: 5px; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-view { background-color: #0056b3; } 
        .btn-upload { background-color: #17a2b8; }
        .btn-block { background-color: #dc3545; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; }
        .status-complete { background-color: #28a745; }
        .status-pending { background-color: #ffc107; color: #333 !important; }

        #detailsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; border: none; background: none; }
        .close-modal:hover { color: #dc3545; }
        .modal-header { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .modal-header h3 { color: #0056b3; font-size: 22px; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .detail-box { background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #eee; }
        .detail-box label { display: block; font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .detail-box p { font-size: 15px; color: #333; font-weight: 600; margin: 0; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Bhavya<span>Admin</span></div>
        <div class="menu">
            <a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="patientadmin.html" class="active"><i class="fas fa-user-injured"></i> Patients Center</a>
            <a href="medicineadmin.html"><i class="fas fa-pills"></i> Medicine Center</a>
            <a href="#" onclick="alert('Lab Admin page pending')"><i class="fas fa-flask"></i> Labs Center</a>
            <a href="#" onclick="alert('Doctor Admin page pending')"><i class="fas fa-user-md"></i> Doctors Center</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Patient Action Center</h2>
            <div class="admin-profile" onclick="window.location.href='../index.html'">
                <span>Logout Admin</span>
                <i class="fas fa-sign-out-alt" style="color: #dc3545;"></i>
            </div>
        </div>

        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div style="position: relative;">
                    <i class="fas fa-search" style="position: absolute; left: 10px; top: 12px; color: #888;"></i>
                    <input type="text" id="searchQuery" class="input-box" style="width: 350px; padding-left: 35px;" placeholder="Search Mobile or User ID..." onkeyup="filterTable()">
                </div>
                <button class="btn-action" style="background-color: #0056b3;" onclick="fetchPatients()">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>

            <div class="table-wrapper">
                <table id="patientTable">
                    <thead>
                        <tr>
                            <th>Date Joined</th>
                            <th>User ID</th>
                            <th>Mobile Number</th>
                            <th>Profile Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody">
                        <tr><td colspan="5" style="text-align: center; padding: 20px;">Fetching patients data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailsModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✖</button>
            <div class="modal-header">
                <h3 id="mod-name">Patient Name</h3>
                <span id="mod-status" class="status-badge status-complete">Active</span>
            </div>
            
            <div class="details-grid">
                <div class="detail-box"><label>User ID</label><p id="mod-id">P123456</p></div>
                <div class="detail-box"><label>Mobile Number</label><p id="mod-mobile">+910000000000</p></div>
                <div class="detail-box"><label>Date of Birth</label><p id="mod-dob">N/A</p></div>
                <div class="detail-box"><label>Email Address</label><p id="mod-email">N/A</p></div>
                <div class="detail-box full-width"><label>Full Address</label><p id="mod-address">N/A</p></div>
                <div class="detail-box"><label>City</label><p id="mod-city">N/A</p></div>
                <div class="detail-box"><label>Pincode</label><p id="mod-pincode">N/A</p></div>
                <div class="detail-box full-width"><label>Referral Code</label><p id="mod-referral" style="color: #0056b3;">N/A</p></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJyrw4TfXI3-2dFQ1oqluakXhP_-MTj3FDAvw5ka54eMjU65KqZvpxR_nQ_hRqwJ1F/exec";
        let allPatientsData = []; 

        window.onload = function() { fetchPatients(); };

        function fetchPatients() {
            const tableBody = document.getElementById('patientTableBody');
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';

            fetch(GOOGLE_SCRIPT_URL)
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    allPatientsData = result.data || []; 
                    tableBody.innerHTML = ""; 
                    
                    if(allPatientsData.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">No patients found.</td></tr>';
                        return;
                    }

                    allPatientsData.forEach((pat, index) => {
                        let formattedDate = pat.timestamp ? new Date(pat.timestamp).toLocaleDateString('en-GB') : "N/A";
                        let badgeClass = pat.profile_status === "Profile Complete" ? "status-complete" : "status-pending";

                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${formattedDate}</td>
                            <td><strong>${pat.user_id}</strong></td>
                            <td>${pat.mobile}</td>
                            <td><span class="status-badge ${badgeClass}">${pat.profile_status}</span></td>
                            <td class="action-btns">
                                <button class="btn-view" title="View Full Profile" onclick="openDetailsModal(${index})"><i class="fas fa-eye"></i> View</button>
                                <button class="btn-upload" title="Upload Report" onclick="alert('Upload Report for ${pat.user_id}')"><i class="fas fa-file-upload"></i></button>
                                <button class="btn-block" title="Block User" onclick="alert('Block ${pat.user_id}?')"><i class="fas fa-ban"></i></button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                }
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Connection error.</td></tr>';
            });
        }

        function openDetailsModal(index) {
            const pat = allPatientsData[index];
            document.getElementById('mod-name').innerText = pat.name !== "N/A" ? pat.name : "Profile Pending";
            document.getElementById('mod-status').innerText = pat.profile_status;
            document.getElementById('mod-status').className = pat.profile_status === "Profile Complete" ? "status-badge status-complete" : "status-badge status-pending";
            document.getElementById('mod-id').innerText = pat.user_id;
            document.getElementById('mod-mobile').innerText = pat.mobile;
            document.getElementById('mod-dob').innerText = pat.dob;
            document.getElementById('mod-email').innerText = pat.email;
            document.getElementById('mod-address').innerText = pat.address;
            document.getElementById('mod-city').innerText = pat.city;
            document.getElementById('mod-pincode').innerText = pat.pincode;
            document.getElementById('mod-referral').innerText = pat.referral;
            document.getElementById('detailsModal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = "none";
        }

        function filterTable() {
            let filter = document.getElementById("searchQuery").value.toUpperCase();
            let table = document.getElementById("patientTableBody");
            let tr = table.getElementsByTagName("tr");

            for (let i = 0; i < tr.length; i++) {
                let tdId = tr[i].getElementsByTagName("td")[1];
                let tdMobile = tr[i].getElementsByTagName("td")[2];
                if (tdId || tdMobile) {
                    let txtValueId = tdId.textContent || tdId.innerText;
                    let txtValueMobile = tdMobile.textContent || tdMobile.innerText;
                    if (txtValueId.toUpperCase().indexOf(filter) > -1 || txtValueMobile.toUpperCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }
    </script>
</body>
</html>
