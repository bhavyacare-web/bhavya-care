<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Management - BhavyaCare Admin</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #f4f7f6; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar { width: 250px; background-color: #0056b3; color: white; display: flex; flex-direction: column; }
        .sidebar .logo { padding: 20px; font-size: 24px; font-weight: bold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar .logo span { color: #28a745; }
        .sidebar .menu { flex: 1; padding: 20px 0; }
        .sidebar .menu a { display: block; padding: 15px 25px; color: white; text-decoration: none; font-size: 16px; transition: 0.3s; }
        .sidebar .menu a:hover, .sidebar .menu a.active { background-color: #004494; border-left: 4px solid #28a745; }
        .sidebar .menu a i { margin-right: 10px; width: 20px; text-align: center; }

        /* Main Content Styling */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Top Header */
        .header { background-color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header h2 { color: #333; font-size: 22px; }
        .admin-profile { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #555; }
        .admin-profile i { font-size: 24px; color: #0056b3; }

        /* Dashboard Container */
        .container { padding: 30px; }
        
        /* Controls (Search & Add) */
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .search-box { padding: 10px 15px; width: 300px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; outline: none; }
        .btn-add { background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background-color: #218838; }

        /* Data Table */
        .table-wrapper { background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; font-weight: 600; }
        td { color: #555; }
        tr:hover { background-color: #f1f1f1; }

        /* Action Buttons */
        .action-btns button { border: none; padding: 6px 10px; margin-right: 5px; border-radius: 4px; cursor: pointer; color: white; font-size: 12px; }
        .btn-view { background-color: #17a2b8; }
        .btn-report { background-color: #ffc107; color: #333 !important; }
        .btn-block { background-color: #dc3545; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Bhavya<span>Admin</span></div>
        <div class="menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="patient.html" class="active"><i class="fas fa-user-injured"></i> Patients</a>
            <a href="lab.html"><i class="fas fa-flask"></i> Labs</a>
            <a href="doctor.html"><i class="fas fa-user-md"></i> Doctors</a>
            <a href="pharmacy.html"><i class="fas fa-pills"></i> Pharmacies</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </div>

    <div class="main-content">
        
        <div class="header">
            <h2>Patient Management</h2>
            <div class="admin-profile">
                <span>Admin User</span>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>

        <div class="container">
            
            <div class="controls">
                <input type="text" id="searchPatient" class="search-box" placeholder="Search by Mobile or User ID...">
                <button class="btn-add"><i class="fas fa-plus"></i> Add New Patient</button>
            </div>

            <div class="table-wrapper">
                <table id="patientTable">
                    <thead>
                        <tr>
                            <th>Joined Date</th>
                            <th>User ID</th>
                            <th>Mobile Number</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody">
                        <tr>
                            <td>23-Mar-2026</td>
                            <td><strong>P112467</strong></td>
                            <td>+918950112467</td>
                            <td><span style="color: green; font-weight: bold;">Active</span></td>
                            <td class="action-btns">
                                <button class="btn-view" title="View Profile"><i class="fas fa-eye"></i></button>
                                <button class="btn-report" title="Upload Report"><i class="fas fa-file-upload"></i></button>
                                <button class="btn-block" title="Block User"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>22-Mar-2026</td>
                            <td><strong>P987654</strong></td>
                            <td>+919876543210</td>
                            <td><span style="color: green; font-weight: bold;">Active</span></td>
                            <td class="action-btns">
                                <button class="btn-view" title="View Profile"><i class="fas fa-eye"></i></button>
                                <button class="btn-report" title="Upload Report"><i class="fas fa-file-upload"></i></button>
                                <button class="btn-block" title="Block User"><i class="fas fa-ban"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
