<style>
    /* Navbar Design */
    .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; padding: 15px 40px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 1000; }
    .logo h2 { color: #0056b3; font-size: 26px; font-weight: 800; margin: 0; }
    .logo span { color: #28a745; }

    /* Right Side Actions */
    .nav-actions { display: flex; align-items: center; gap: 15px; }
    .cart-btn { text-decoration: none; color: #333; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    #cart-count { background-color: #e74c3c; color: white; padding: 2px 7px; border-radius: 50%; font-size: 12px; }
    
    .btn { border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
    .login-btn { background-color: #0056b3; }
    .login-btn:hover { background-color: #004494; }

    /* 3-Dot Dropdown Menu */
    .dropdown { position: relative; display: inline-block; }
    .dropbtn { background-color: transparent; color: #333; font-size: 24px; border: none; cursor: pointer; padding: 0 5px; font-weight: bold; }
    .dropbtn:hover { color: #0056b3; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: #ffffff; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.1); z-index: 1001; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
    .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; border-bottom: 1px solid #f4f4f4; font-weight: 500; }
    .dropdown-content a:hover { background-color: #f9f9f9; color: #0056b3; }
    .show-menu { display: block; }

    /* --- LOGIN FORM BOX --- */
    #login-section { width: 90%; max-width: 400px; margin: 40px auto; padding: 30px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 10px; text-align: center; display: none; position: absolute; top: 70px; right: 40px; z-index: 999; }
    #login-section h3 { color: #333; margin-bottom: 20px; }
    .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; outline: none; }
    .input-box:focus { border-color: #0056b3; }
    .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .action-btn:hover { background-color: #218838; }
    .support-text { font-size: 12px; color: #888; margin-top: 15px; }

    /* --- NEW: PATIENT PROFILE FORM BOX --- */
    #profile-form-section {
        width: 90%; max-width: 500px; margin: 20px auto; padding: 30px; background: white; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 12px; text-align: left; 
        display: none; position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1002; 
    }
    #profile-form-section h3 { color: #0056b3; margin-bottom: 5px; text-align: center; font-size: 22px; }
    #profile-form-section p.sub-text { color: #666; font-size: 14px; text-align: center; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .full-width { grid-column: span 2; }
    .close-btn { position: absolute; top: 15px; right: 20px; font-size: 22px; color: #888; cursor: pointer; border: none; background: none; transition: 0.2s; }
    .close-btn:hover { color: #dc3545; }
    .btn-skip { background-color: #f8f9fa; color: #555; border: 1px solid #ddd; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.3s; font-size: 16px;}
    .btn-skip:hover { background-color: #e2e2e2; }

    @media (max-width: 768px) { .navbar { padding: 15px; } .logo h2 { font-size: 22px; } .btn { padding: 8px 15px; font-size: 14px; } #login-section { right: 5%; left: 5%; width: 90%; top: 80px; margin: 0 auto; } .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
</style>

<header class="navbar">
    <div class="logo">
        <h2>Bhavya<span>Care</span></h2>
    </div>

    <div class="nav-actions">
        <a href="#" class="cart-btn">🛒 Cart <span id="cart-count">0</span></a>
        <button id="nav-login-btn" class="btn login-btn" onclick="openPatientLogin()">Login</button>
        
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleMenu()">⋮</button>
            <div id="myDropdown" class="dropdown-content">
                <a href="#" id="menu-join" onclick="openPartnerLogin()">🤝 Join Us (Partner)</a>
                <a href="#" id="menu-dashboard" onclick="goToDashboard()" style="display: none;">📊 My Dashboard</a>
                <a href="admin/admin.html" id="menu-admin" style="color: #0056b3;"><i class="fas fa-user-shield"></i> 🛡️ Admin Panel</a>
                <a href="#" id="menu-logout" onclick="logoutUser()" style="display: none; color: #e74c3c;">🚪 Logout</a>
            </div>
        </div>
    </div>
</header>

<div id="login-section">
    <h3 id="form-title">Login / Sign Up</h3>
    <div id="phone-section">
        <div id="partner-role-container" style="display: none; margin-bottom: 15px;">
            <p style="text-align: left; font-size: 14px; color: #666;">Select Partner Type:</p>
            <select id="partnerRole" class="input-box">
                <option value="doctor" selected>Doctor</option>
                <option value="lab">Lab</option>
                <option value="pharmacy">Pharmacy</option>
                <option value="hospital">Hospital</option>
                <option value="executive">Executive</option>
            </select>
        </div>
        <p style="text-align: left; font-size: 14px; color: #666;">Mobile Number:</p>
        <input type="tel" id="phoneNumber" class="input-box" placeholder="e.g. 8950112467" maxlength="10">
        <div id="recaptcha-container" style="margin-top: 10px;"></div>
        <button id="send-otp-btn" class="action-btn" onclick="sendOTP()">Get OTP</button>
    </div>

    <div id="otp-section" style="display: none;">
        <p style="text-align: left; font-size: 14px; color: #666;">Enter OTP:</p>
        <input type="tel" id="otpCode" class="input-box" placeholder="6-digit OTP" maxlength="6">
        <button class="action-btn" style="background-color: #0056b3;" onclick="verifyOTP()">Verify Mobile</button>
        <p style="margin-top: 15px; font-size: 13px; color: #0056b3; cursor: pointer; text-decoration: underline;" onclick="closeLoginPopup()">Cancel</p>
    </div>
    <p class="support-text">Need help? Email us at bhavyacare1@gmail.com</p>
</div>

<div id="profile-form-section">
    <button class="close-btn" onclick="closeProfileForm()">✖</button>
    <h3>Complete Your Profile</h3>
    <p class="sub-text">Please fill this information to book tests.</p>
    
    <div class="form-grid">
        <div class="full-width">
            <label style="font-size: 13px; color: #555; font-weight: bold;">Full Name *</label>
            <input type="text" id="profName" class="input-box" placeholder="Enter your name">
        </div>
        
        <div>
            <label style="font-size: 13px; color: #555; font-weight: bold;">Date of Birth</label>
            <input type="date" id="profDOB" class="input-box">
        </div>
        
        <div>
            <label style="font-size: 13px; color: #555; font-weight: bold;">Email ID</label>
            <input type="email" id="profEmail" class="input-box" placeholder="optional@gmail.com">
        </div>

        <div class="full-width">
            <label style="font-size: 13px; color: #555; font-weight: bold;">Address *</label>
            <input type="text" id="profAddress" class="input-box" placeholder="House No, Street, Area">
        </div>

        <div>
            <label style="font-size: 13px; color: #555; font-weight: bold;">City *</label>
            <input type="text" id="profCity" class="input-box" placeholder="e.g. Delhi">
        </div>

        <div>
            <label style="font-size: 13px; color: #555; font-weight: bold;">Pincode *</label>
            <input type="number" id="profPincode" class="input-box" placeholder="6 digits">
        </div>

        <div class="full-width">
            <label style="font-size: 13px; color: #555; font-weight: bold;">Referral Code (If any)</label>
            <input type="text" id="profReferral" class="input-box" placeholder="Optional">
        </div>
    </div>

    <button id="btn-save-profile" class="action-btn" onclick="savePatientProfile()">Save Profile</button>
    <button class="btn-skip" onclick="closeProfileForm()">Skip for Now</button>
</div>
